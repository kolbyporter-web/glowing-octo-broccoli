<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Install Tracker</title>
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --info-color: #17a2b8;
            --light-color: #f8f9fa;
            --dark-color: #343a40;
        }
    </style>
</head>
<body>
    <h1>Unit Install Tracker</h1>
    <form>
        <label for="ptask">PTASK Input:</label>
        <input type="text" id="ptask" name="ptask" pattern="^PTASK-[0-9]+$" title="Please enter a number after 'PTASK-'" required>
        <button type="submit">Submit</button>
    </form>
    <script>
        const ptaskInput = document.getElementById('ptask');
        ptaskInput.addEventListener('input', function() {
            const value = ptaskInput.value;
            if (!value.startsWith('PTASK-')) {
                ptaskInput.value = 'PTASK-';
            }
            const numberPart = value.replace('PTASK-', '');
            ptaskInput.value = 'PTASK-' + numberPart.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
