// ── Job Detail Screen ─────────────────────────────────────────────
function JobDetailScreen({ job, onBack, onUpdate, showToast, timeOff, getTechTimeOffForWeek, jobDateKey, onDispatched }) {
  const [showAssign, setShowAssign] = useState(false);
  const [showDirections, setShowDirections] = useState(false);
  const [dispatched, setDispatched] = useState(false);
  const [dispatching, setDispatching] = useState(false);
  const [overrideDate, setOverrideDate] = useState("");
  const tech = getTech(job.assignedTo);

  const handleAssign = (techId) => {
    const updatedJob = { assignedTo: techId, status: techId ? "assigned" : "unassigned" };
    if (overrideDate) {
      // Format overrideDate (YYYY-MM-DD) to "Mon DD" display format
      const d = new Date(overrideDate + "T12:00:00");
      updatedJob.dueDate = d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }
    onUpdate(job.id, updatedJob);
    setShowAssign(false);
    if (techId) {
      const techName = getTech(techId)?.name;
      const dateMsg = overrideDate ? ` · Due ${updatedJob.dueDate}` : "";
      showToast(`✓ Assigned to ${techName}${dateMsg}`);
    }
    setOverrideDate("");
  };

  // ── Apps Script endpoint ──────────────────────────────────────────
  // Replace this URL with your deployed Apps Script web app URL
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwjAUP4U5pKppj8yhRZhu-x4wOypPG1wdj4Ns5NqlEzbEs6p3uBCilBsquixEj6DabQ/exec";

  const handleDispatch = async () => {
    if (!tech) return;
    setDispatching(true);

    const payload = {
      action:      "dispatch",
      techName:    tech.name,
      techEmail:   tech.email,
      jobId:       job.id,
      jobTitle:    job.title,
      address:     job.address,
      dueDate:     job.dueDate,
      timeWindow:  job.timeWindow,
      accessCode:  job.accessCode,
      contact:     `${job.contact.name} (${job.contact.role}) — ${job.contact.phone}`,
      hubLocation: job.hubMount.location,
      devices:     job.devices.map(d => `${d.name} ×${d.qty}`).join("\n"),
      notes:       job.notes,
      totalDevices: job.devices.reduce((s, d) => s + d.qty, 0),
    };

    try {
      // Use GET with URL params — bypasses CORS restrictions completely
      const params = new URLSearchParams({
        action:       "dispatch",
        techName:     tech.name,
        techEmail:    tech.email,
        jobId:        job.id,
        jobTitle:     job.title,
        address:      job.address,
        dueDate:      job.dueDate,
        timeWindow:   job.timeWindow,
        accessCode:   job.accessCode,
        contact:      `${job.contact.name} (${job.contact.role}) — ${job.contact.phone}`,
        hubLocation:  job.hubMount.location,
        devices:      job.devices.map(d => `${d.name} x${d.qty}`).join(", "),
        notes:        job.notes,
        totalDevices: job.devices.reduce((s, d) => s + d.qty, 0),
      });

      await fetch(`${APPS_SCRIPT_URL}?${params.toString()}`, {
        method: "GET",
        mode:   "no-cors",
      });

      setDispatched(true);
      setDispatching(false);
      showToast(`⚡ ${tech.name} dispatched! Email + calendar sent`);
      if (onDispatched) onDispatched(job.id);
    } catch (err) {
      setDispatching(false);
      showToast("❌ Dispatch failed — check connection");
    }
  };

  const encoded = encodeURIComponent(job.address);
  const googleMapsUrl = `comgooglemaps://?daddr=${encoded}&directionsmode=driving`;
  const appleMapsUrl  = `maps://?daddr=${encoded}`;

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", position: "relative" }}>
      {/* Header */}
      <div style={{
        display: "flex", alignItems: "center", gap: 12,
        padding: "14px 16px", borderBottom: "1px solid #333333",
      }}>
        <button onClick={onBack} style={{
          background: "#1E1E1E", border: "1px solid #3A3A3A", borderRadius: 10,
          width: 38, height: 38, color: "#AAAAAA", fontSize: 20,
          cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
        }}>‹</button>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 13, color: "#FFFFFF", letterSpacing: "0.08em" }}>{job.id}</div>
          <div style={{ fontSize: 14, color: "#FFFFFF", fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{job.title}</div>
        </div>
        <span style={{ color: "#444444", fontSize: 18, flexShrink: 0, marginLeft: 8 }}>›</span>
      </div>

      {/* Body */}
      <div style={{ flex: 1, overflowY: "auto", padding: "0 16px" }}>

        {/* ── 1. Assigned Tech ── */}
        <div style={{ padding: "16px 0 0" }}>
          <SectionLabel>TECHNICIAN</SectionLabel>
          {tech ? (
            <div style={{
              display: "flex", alignItems: "center", gap: 14,
              background: "#1E1E1E", border: `1px solid ${tech.color}40`,
              borderRadius: 14, padding: "14px 16px",
            }}>
              <Avatar tech={tech} size={44} />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 16, color: tech.color, fontWeight: 600 }}>{tech.name}</div>
                <div style={{ fontSize: 13, color: "#888888", marginTop: 2 }}>{tech.email}</div>
              </div>
              <button onClick={() => setShowAssign(true)} style={{
                background: "none", border: "1px solid #3A3A3A", borderRadius: 8,
                padding: "7px 14px", color: "#AAAAAA", fontSize: 13, cursor: "pointer",
              }}>Change</button>
            </div>
          ) : (
            <button onClick={() => setShowAssign(true)} style={{
              width: "100%", padding: "18px",
              background: "#1E1E1E", border: "2px dashed #3A3A3A",

              display: "flex", alignItems: "center", justifyContent: "center", gap: 10,
            }}>
              <span style={{ fontSize: 20, color: "#666666" }}>+</span>
              Tap to assign a technician
            </button>
          )}
        </div>

        {/* ── 2. Job Info (compact) ── */}
        <div style={{ padding: "16px 0 0" }}>
          <SectionLabel>JOB INFO</SectionLabel>
          <InfoBlock>
            {/* Address row with directions button */}
            <div style={{
              display: "flex", gap: 12, padding: "12px 14px",
              borderBottom: "1px solid #1E1E1E", alignItems: "flex-start",
            }}>
              <span style={{ fontSize: 16, flexShrink: 0, marginTop: 2 }}>📍</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 11, color: "#888888", letterSpacing: "0.10em", marginBottom: 3 }}>ADDRESS</div>
                <div style={{ fontSize: 13, color: "#F0F0F0", lineHeight: 1.5 }}>{job.address}</div>
              </div>
              <button
                onClick={() => setShowDirections(true)}
                style={{
                  flexShrink: 0, display: "flex", alignItems: "center", gap: 5,
                  background: "linear-gradient(135deg, #333333, #111111)",
                  border: "none", borderRadius: 8,
                  padding: "7px 12px", textDecoration: "none",
                  color: "#fff", fontSize: 12, fontWeight: 600,
                  boxShadow: "0 2px 10px rgba(255,255,255,0.08)",
                  whiteSpace: "nowrap", cursor: "pointer",
                }}
              >
                🗺 Directions
              </button>
            </div>
            <InfoRow icon="📅" label="Due · Time Window" value={`${job.dueDate}  ·  ${job.timeWindow}`} />
            <InfoRow icon="🔑" label="Access Code" value={job.accessCode} last />
          </InfoBlock>
        </div>

        {/* ── 3. Devices ── */}
        <div style={{ padding: "16px 0 0" }}>
          <SectionLabel>DEVICES TO INSTALL</SectionLabel>
          <div style={{ background: "#161616", border: "1px solid #333333", borderRadius: 12, overflow: "hidden" }}>
            {job.devices.map((d, i) => (
              <div key={i} style={{
                display: "flex", justifyContent: "space-between", alignItems: "center",
                padding: "11px 14px",
                borderBottom: i < job.devices.length - 1 ? "1px solid #1E1E1E" : "none",
              }}>
                <span style={{ fontSize: 14, color: "#F0F0F0" }}>{d.name}</span>
                <span style={{
                  fontSize: 13, color: "#FFFFFF",
                  background: "#22222288", border: "1px solid #FFFFFF30",
                  borderRadius: 20, padding: "2px 12px", fontWeight: 600, flexShrink: 0,
                }}>×{d.qty}</span>
              </div>
            ))}
            <div style={{
              display: "flex", justifyContent: "space-between", alignItems: "center",
              padding: "11px 14px", borderTop: "1px solid #333333",
              background: "#181818",
            }}>
              <span style={{ fontSize: 13, color: "#888888", fontWeight: 600 }}>TOTAL</span>
              <span style={{ fontSize: 15, color: "#FFFFFF", fontWeight: 700 }}>
                {job.devices.reduce((sum, d) => sum + d.qty, 0)} devices
              </span>
            </div>
          </div>
        </div>

        {/* ── 4. On-site Contact ── */}
        <div style={{ padding: "16px 0 0" }}>
          <SectionLabel>ON-SITE CONTACT</SectionLabel>
          <InfoBlock>
            <InfoRow icon="👤" label={job.contact.role} value={job.contact.name} />
            <InfoRow icon="📞" label="Phone" value={
              <a href={`tel:${job.contact.phone}`} style={{ color: "#FFFFFF", textDecoration: "none", fontSize: 15 }}>
                {job.contact.phone}
              </a>
            } last />
          </InfoBlock>
        </div>

        {/* ── 5. Hub & Notes ── */}
        <div style={{ padding: "16px 0 0" }}>
          <SectionLabel>HUB & NOTES</SectionLabel>
          <InfoBlock>
            <InfoRow icon="📡" label="Hub Mount Location" value={job.hubMount.location} />
            <InfoRow icon="💬" label="Notes" value={job.notes} last />
          </InfoBlock>
        </div>

        {/* Dispatched confirmation */}
        {dispatched && (
          <div style={{
            margin: "16px 0 0", background: "#0F1F14",
            border: "1px solid #00E5A040", borderRadius: 12,
            padding: "14px 16px", display: "flex", gap: 12, alignItems: "center",
          }}>
            <span style={{ fontSize: 22 }}>✅</span>
            <div>
              <div style={{ fontSize: 14, color: "#00E5A0", fontWeight: 600 }}>Dispatched</div>
              <div style={{ fontSize: 13, color: "#888888", marginTop: 2 }}>Calendar invite sent · Email delivered to {tech?.name}</div>
            </div>
          </div>
        )}

        <div style={{ height: 110 }} />
      </div>

      {/* Dispatch button */}
      {tech && !dispatched && (
        <div style={{
          position: "absolute", bottom: 0, left: 0, right: 0,
          padding: "12px 16px 24px",
          background: "linear-gradient(to top, #111111 60%, transparent)",
        }}>
          <button onClick={handleDispatch} disabled={dispatching} style={{
            width: "100%", padding: "18px",
            background: dispatching
              ? "#1E1E1E"
              : "linear-gradient(135deg, #333333, #111111)",
            border: dispatching ? "1px solid #3A3A3A" : "none",
            borderRadius: 16,
            color: dispatching ? "#888888" : "#fff",
            fontSize: 16, fontWeight: 700,
            cursor: dispatching ? "default" : "pointer",
            letterSpacing: "0.02em",
            boxShadow: dispatching ? "none" : "0 6px 28px rgba(255,255,255,0.1)",
            transition: "all 0.2s",
          }}>
            {dispatching ? "⏳ Sending..." : `⚡ Dispatch ${tech.name}`}
          </button>
        </div>
      )}

      {/* Directions Sheet */}
      <BottomSheet open={showDirections} onClose={() => setShowDirections(false)} title="OPEN DIRECTIONS IN">
        <a href={appleMapsUrl}
          onClick={() => setShowDirections(false)}
          style={{ textDecoration: "none" }}>
          <div style={{
            display: "flex", alignItems: "center", gap: 16,
            padding: "18px 20px", borderBottom: "1px solid #141414", cursor: "pointer",
          }}>
            <div style={{
              width: 48, height: 48, borderRadius: 12, flexShrink: 0,
              background: "linear-gradient(135deg, #34C759, #30B0C7)",
              display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26,
            }}>🗺</div>
            <div>
              <div style={{ fontSize: 16, color: "#FFFFFF", fontWeight: 600 }}>Apple Maps</div>
              <div style={{ fontSize: 13, color: "#888888", marginTop: 2 }}>Opens in Apple Maps app</div>
            </div>
            <span style={{ color: "#3A3A3A", fontSize: 20, marginLeft: "auto" }}>›</span>
          </div>
        </a>

        <a href={googleMapsUrl}
          onClick={() => setShowDirections(false)}
          style={{ textDecoration: "none" }}>
          <div style={{
            display: "flex", alignItems: "center", gap: 16,
            padding: "18px 20px", cursor: "pointer",
          }}>
            <div style={{
              width: 48, height: 48, borderRadius: 12, flexShrink: 0,
              background: "linear-gradient(135deg, #4285F4, #34A853)",
              display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26,
            }}>📍</div>
            <div>
              <div style={{ fontSize: 16, color: "#FFFFFF", fontWeight: 600 }}>Google Maps</div>
              <div style={{ fontSize: 13, color: "#888888", marginTop: 2 }}>Opens in Google Maps app</div>
            </div>
            <span style={{ color: "#3A3A3A", fontSize: 20, marginLeft: "auto" }}>›</span>
          </div>
        </a>
      </BottomSheet>

      {/* Assign sheet */}
      <BottomSheet open={showAssign} onClose={() => { setShowAssign(false); setOverrideDate(""); }} title="ASSIGN TECHNICIAN">

        {/* Due date override */}
        <div style={{
          margin: "0 20px 4px",
          background: "#1A1A1A", border: "1px solid #2A2A2A",
          borderRadius: 12, padding: "14px 16px",
        }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <div>
              <div style={{ fontSize: 12, color: "#CCCCCC", fontWeight: 600 }}>Due Date</div>
              <div style={{ fontSize: 11, color: "#555555", marginTop: 2 }}>
                Current: <span style={{ color: overrideDate ? "#FF8A00" : "#888888" }}>
                  {overrideDate
                    ? new Date(overrideDate + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" })
                    : job.dueDate}
                </span>
              </div>
            </div>
            {overrideDate ? (
              <button onClick={() => setOverrideDate("")} style={{
                background: "#2A1A08", border: "1px solid #FF8A0040",
                borderRadius: 8, padding: "5px 10px",
                fontSize: 11, color: "#FF8A00", cursor: "pointer",
              }}>✕ Reset</button>
            ) : (
              <span style={{ fontSize: 11, color: "#444444" }}>Override →</span>
            )}
          </div>
          <input
            type="date"
            value={overrideDate}
            onChange={e => setOverrideDate(e.target.value)}
            style={{
              width: "100%", background: "#111111",
              border: `1px solid ${overrideDate ? "#FF8A00" : "#333333"}`,
              borderRadius: 8, color: overrideDate ? "#FF8A00" : "#888888",
              fontSize: 14, padding: "9px 12px", outline: "none",
              fontFamily: "'DM Mono', monospace",
            }}
          />
          {overrideDate && (
            <div style={{ fontSize: 11, color: "#FF8A00", marginTop: 6 }}>
              ⚠️ Due date will be updated when you assign
            </div>
          )}
        </div>

        <div style={{ height: 1, background: "#222222", margin: "8px 0" }} />
        {TECHS.map(t => {
          const isActive = job.assignedTo === t.id;
          const count = MOCK_JOBS.filter(j => j.assignedTo === t.id).length;

          // Find time-off on the job's specific day
          const techTimeOff = timeOff?.[t.id] || {};
          const dayOffStatus = jobDateKey ? techTimeOff[jobDateKey] : null;

          // Collect ALL time-off days this week for this tech
          // Build current week days dynamically from today
          const todayRef = new Date();
          const startOfWeek = new Date(todayRef);
          startOfWeek.setDate(todayRef.getDate() - todayRef.getDay());
          const currentWeekDays = Array.from({ length: 7 }, (_, i) => {
            const d = new Date(startOfWeek);
            d.setDate(startOfWeek.getDate() + i);
            const key = d.toISOString().slice(0, 10).replace(/-/g, "").replace(/^(\d{4})(\d{2})(\d{2})$/, "apr$3").toLowerCase();
            return { key: d.toISOString().slice(0, 10), date: d.toLocaleDateString("en-US", { month: "short", day: "numeric" }) };
          });
          const weekTimeOffDays = getTechTimeOffForWeek
            ? getTechTimeOffForWeek(t.id, currentWeekDays)
            : [];

          const isUnavailable = dayOffStatus === "off";
          const hasRequest = dayOffStatus === "requested";

          return (
            <div key={t.id} onClick={() => !isUnavailable && handleAssign(t.id)} style={{
              display: "flex", alignItems: "center", gap: 14,
              padding: "14px 20px",
              background: isActive
                ? t.color + "10"
                : isUnavailable ? "#2A1018"
                : "transparent",
              borderBottom: "1px solid #181818",
              cursor: isUnavailable ? "default" : "pointer",
              opacity: isUnavailable ? 0.8 : 1,
            }}>
              <div style={{ position: "relative" }}>
                <Avatar tech={t} size={44} />
                {/* Time-off icon badge on avatar */}
                {(isUnavailable || hasRequest) && (
                  <div style={{
                    position: "absolute", bottom: -2, right: -2,
                    width: 16, height: 16, borderRadius: "50%",
                    background: isUnavailable ? "#FF2D55" : "#FF8A00",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 8, border: "2px solid #1E1E1E",
                  }}>
                    {isUnavailable ? "✕" : "?"}
                  </div>
                )}
              </div>

              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 15, color: isActive ? t.color : isUnavailable ? "#FF2D5590" : "#F0F0F0", fontWeight: isActive ? 600 : 400 }}>
                  {t.name}
                </div>

                {/* Status line */}
                {isUnavailable ? (
                  <div style={{ fontSize: 13, color: "#FF2D55", marginTop: 2 }}>🚫 Day off on {job.dueDate}</div>
                ) : hasRequest ? (
                  <div style={{ fontSize: 13, color: "#FF8A00", marginTop: 2 }}>⏳ Time off requested {job.dueDate}</div>
                ) : weekTimeOffDays.length > 0 ? (
                  <div style={{ fontSize: 13, color: "#888888", marginTop: 2 }}>
                    {count} job{count !== 1 ? "s" : ""} · off {weekTimeOffDays.map(d => d.date).join(", ")}
                  </div>
                ) : (
                  <div style={{ fontSize: 13, color: "#888888", marginTop: 2 }}>{count} job{count !== 1 ? "s" : ""} this week</div>
                )}
              </div>

              {isActive && <span style={{ color: t.color, fontSize: 20, flexShrink: 0 }}>✓</span>}
              {isUnavailable && <span style={{ fontSize: 13, color: "#FF2D5560", flexShrink: 0 }}>Unavailable</span>}
            </div>
          );
        })}
        {job.assignedTo && (
          <>
            <div style={{ height: 1, background: "#333333", margin: "4px 0" }} />
            <div onClick={() => { onUpdate(job.id, { assignedTo: null, status: "unassigned" }); setShowAssign(false); setOverrideDate(""); }} style={{
              padding: "16px 20px", color: "#FF2D55",
              fontSize: 14, cursor: "pointer", textAlign: "center",
            }}>Remove assignment</div>
          </>
        )}
      </BottomSheet>
    </div>
  );
}

// ── Tech Detail Screen ────────────────────────────────────────────
function TechDetailScreen({ tech, jobs, onBack, onJobTap, showToast, timeOff, onUpdateTimeOff }) {
  const techJobs   = jobs.filter(j => j.assignedTo === tech.id);
  const today      = new Date();
  const [viewDate, setViewDate]   = useState(new Date(today.getFullYear(), today.getMonth(), 1));
  const [selectedDay, setSelectedDay] = useState(null);
  const [showDaySheet, setShowDaySheet] = useState(false);

  const year        = viewDate.getFullYear();
  const month       = viewDate.getMonth();
  const monthLabel  = viewDate.toLocaleDateString("en-US", { month: "long", year: "numeric" });
  const firstDay    = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayKey    = today.toISOString().slice(0, 10);

  const dateKey = (d) => `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;

  // Map tech's jobs to date keys
  const jobsByDate = {};
  techJobs.forEach(job => {
    if (!job.dueDate) return;
    const parsed = new Date(`${job.dueDate} ${year}`);
    if (isNaN(parsed)) return;
    const key = parsed.toISOString().slice(0, 10);
    if (!jobsByDate[key]) jobsByDate[key] = [];
    jobsByDate[key].push(job);
  });

  const selectedKey  = selectedDay ? dateKey(selectedDay) : null;
  const selectedJobs = selectedKey ? (jobsByDate[selectedKey] || []) : [];
  const monthJobCount = techJobs.filter(j => {
    const p = new Date(`${j.dueDate} ${year}`);
    return !isNaN(p) && p.getMonth() === month && p.getFullYear() === year;
  }).length;

  const handleDayTap = (d) => { setSelectedDay(selectedDay === d ? null : d); setShowDaySheet(false); };

  const markTimeOff = (type) => {
    onUpdateTimeOff(selectedKey, type);
    setShowDaySheet(false);
    const label = new Date(year, month, selectedDay).toLocaleDateString("en-US", { month: "short", day: "numeric" });
    showToast(type === "off" ? `🚫 ${tech.name} off on ${label}` : `⏳ Time off requested for ${label}`);
  };

  const clearTimeOff = () => {
    onUpdateTimeOff(selectedKey, null);
    setShowDaySheet(false);
    const label = new Date(year, month, selectedDay).toLocaleDateString("en-US", { month: "short", day: "numeric" });
    showToast(`✓ ${label} marked available`);
  };

  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const DAY_LABELS = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: "#111111" }}>

      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 16px", borderBottom: "1px solid #222222" }}>
        <button onClick={onBack} style={{
          background: "#1E1E1E", border: "1px solid #2A2A2A", borderRadius: 10,
          width: 38, height: 38, color: "#888888", fontSize: 20,
          cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
        }}>‹</button>
        <Avatar tech={tech} size={38} />
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 16, color: tech.color, fontWeight: 700 }}>{tech.name}</div>
          <div style={{ fontSize: 11, color: "#555555" }}>{monthJobCount} job{monthJobCount !== 1 ? "s" : ""} in {monthLabel}</div>
        </div>
      </div>

      {/* Scrollable content */}
      <div style={{ flex: 1, overflowY: "auto" }}>

        {/* ── Monthly Calendar ── */}
        <div style={{ padding: "14px 14px 0" }}>

          {/* Month nav */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
            <button onClick={() => { setViewDate(new Date(year, month - 1, 1)); setSelectedDay(null); }} style={{
              background: "#1E1E1E", border: "1px solid #2A2A2A", borderRadius: 8,
              width: 32, height: 32, color: "#888888", fontSize: 16,
              cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            }}>‹</button>
            <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 15, fontWeight: 800, color: "#FFFFFF", letterSpacing: "0.04em" }}>
              {monthLabel.toUpperCase()}
            </div>
            <button onClick={() => { setViewDate(new Date(year, month + 1, 1)); setSelectedDay(null); }} style={{
              background: "#1E1E1E", border: "1px solid #2A2A2A", borderRadius: 8,
              width: 32, height: 32, color: "#888888", fontSize: 16,
              cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            }}>›</button>
          </div>

          {/* Day labels */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", marginBottom: 6 }}>
            {DAY_LABELS.map(d => (
              <div key={d} style={{ textAlign: "center", fontSize: 10, color: "#444444", paddingBottom: 4, letterSpacing: "0.04em" }}>{d}</div>
            ))}
          </div>

          {/* Calendar grid */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 3 }}>
            {cells.map((day, i) => {
              if (!day) return <div key={`e-${i}`} />;
              const key      = dateKey(day);
              const dayJobs  = jobsByDate[key] || [];
              const isToday  = key === todayKey;
              const isSel    = day === selectedDay;
              const hasJobs  = dayJobs.length > 0;
              const offStatus = (timeOff || {})[key];

              return (
                <div key={day} onClick={() => handleDayTap(day)} style={{
                  minHeight: 48, borderRadius: 9, padding: "5px 3px 4px",
                  background: isSel && offStatus   ? "#3A1020"
                            : isSel               ? tech.color + "22"
                            : offStatus           ? "#2A1018"
                            : isToday             ? "#1E1E1E"
                            : "transparent",
                  border: isSel && offStatus ? "1px solid #FF2D5560"
                        : isSel             ? `1px solid ${tech.color}60`
                        : offStatus         ? "1px solid #FF2D5530"
                        : isToday           ? "1px solid #333333"
                        : "1px solid transparent",
                  cursor: "pointer", display: "flex", flexDirection: "column",
                  alignItems: "center", gap: 3, transition: "all 0.15s",
                }}>
                  {/* Day number */}
                  <div style={{
                    fontSize: 12, fontWeight: isToday ? 700 : 400,
                    color: offStatus           ? "#FF2D5580"
                         : isSel              ? tech.color
                         : isToday            ? "#FFFFFF"
                         : hasJobs            ? "#CCCCCC"
                         : "#444444",
                  }}>{day}</div>

                  {/* Status indicator */}
                  {offStatus ? (
                    <div style={{ fontSize: 11 }}>{offStatus === "off" ? "🚫" : "⏳"}</div>
                  ) : hasJobs ? (
                    <div style={{
                      minWidth: 18, height: 18, borderRadius: 9,
                      background: isSel ? tech.color : tech.color + "35",
                      border: `1px solid ${tech.color}${isSel ? "ff" : "70"}`,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 9, fontWeight: 700,
                      color: isSel ? "#000" : tech.color,
                      padding: "0 3px",
                      boxShadow: isSel ? `0 0 6px ${tech.color}80` : "none",
                    }}>{dayJobs.length}</div>
                  ) : (
                    <div style={{ width: 5, height: 5, borderRadius: "50%", background: "#1E2A1A", border: "1px solid #2A4030" }} />
                  )}
                </div>
              );
            })}
          </div>

          {/* Selected day panel */}
          {selectedDay && (
            <div style={{ marginTop: 12, background: "#1A1A1A", borderRadius: 12, overflow: "hidden" }}>
              {/* Day header */}
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 14px", borderBottom: "1px solid #222222" }}>
                <div style={{ fontSize: 11, color: "#888888", letterSpacing: "0.08em" }}>
                  {new Date(year, month, selectedDay).toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" }).toUpperCase()}
                  {(timeOff || {})[selectedKey] === "off" && <span style={{ color: "#FF2D55", marginLeft: 8 }}>· DAY OFF</span>}
                  {(timeOff || {})[selectedKey] === "requested" && <span style={{ color: "#FF8A00", marginLeft: 8 }}>· REQUESTED</span>}
                </div>
                <button onClick={() => setShowDaySheet(true)} style={{
                  background: (timeOff || {})[selectedKey] ? "#2A1018" : "#222222",
                  border: `1px solid ${(timeOff || {})[selectedKey] ? "#FF2D5540" : "#333333"}`,
                  borderRadius: 7, padding: "4px 10px",
                  fontSize: 11, color: (timeOff || {})[selectedKey] ? "#FF2D55" : "#888888", cursor: "pointer",
                }}>
                  {(timeOff || {})[selectedKey] === "off" ? "🚫 Off" : (timeOff || {})[selectedKey] === "requested" ? "⏳ Requested" : "+ Time Off"}
                </button>
              </div>

              {/* Jobs or off banner */}
              <div style={{ padding: "10px 14px" }}>
                {(timeOff || {})[selectedKey] ? (
                  <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0" }}>
                    <span style={{ fontSize: 18 }}>{(timeOff || {})[selectedKey] === "off" ? "🚫" : "⏳"}</span>
                    <div>
                      <div style={{ fontSize: 13, color: "#FF2D55", fontWeight: 500 }}>
                        {(timeOff || {})[selectedKey] === "off" ? "Day Off" : "Time Off Requested"}
                      </div>
                      <div style={{ fontSize: 11, color: "#555555", marginTop: 1 }}>Not available for dispatch</div>
                    </div>
                  </div>
                ) : selectedJobs.length === 0 ? (
                  <div style={{ color: "#2A4030", fontSize: 12, padding: "6px 0" }}>✓ Available</div>
                ) : selectedJobs.map((job, i) => {
                  return (
                    <div key={job.id} onClick={() => onJobTap(job)} style={{
                      borderLeft: `3px solid ${tech.color}`,
                      borderRadius: "0 8px 8px 0",
                      background: "#222222",
                      padding: "8px 12px",
                      marginBottom: i < selectedJobs.length - 1 ? 6 : 0,
                      cursor: "pointer",
                    }}>
                      <div style={{ marginBottom: 3 }}>
                        <span style={{ fontSize: 11, color: "#FFFFFF", fontWeight: 600 }}>{job.id}</span>
                      </div>
                      <div style={{ fontSize: 12, color: "#AAAAAA" }}>{job.title}</div>
                      {job.startTime && <div style={{ fontSize: 10, color: "#555555", marginTop: 2 }}>🕐 {job.startTime}</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>

        {/* ── All Jobs This Month ── */}
        <div style={{ padding: "16px 14px" }}>
          <div style={{ fontSize: 10, color: "#444444", letterSpacing: "0.12em", marginBottom: 10 }}>
            {selectedDay
              ? `${new Date(year, month, selectedDay).toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" }).toUpperCase()} JOBS`
              : `ALL JOBS — ${monthLabel.toUpperCase()}`}
          </div>
          {(selectedDay ? selectedJobs : techJobs.filter(j => {
            const p = new Date(`${j.dueDate} ${year}`);
            return !isNaN(p) && p.getMonth() === month && p.getFullYear() === year;
          })).length === 0 ? (
            <div style={{ textAlign: "center", color: "#333333", padding: 32, fontSize: 13 }}>
              No jobs {selectedDay ? "on this day" : "this month"}
            </div>
          ) : (selectedDay ? selectedJobs : techJobs.filter(j => {
            const p = new Date(`${j.dueDate} ${year}`);
            return !isNaN(p) && p.getMonth() === month && p.getFullYear() === year;
          })).map(job => <JobCard key={job.id} job={job} onTap={() => onJobTap(job)} />)}
        </div>
      </div>

      {/* ── Day Off Bottom Sheet ── */}
      <BottomSheet open={showDaySheet} onClose={() => setShowDaySheet(false)}
        title={selectedDay ? new Date(year, month, selectedDay).toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" }).toUpperCase() : ""}>
        <div onClick={() => markTimeOff("off")} style={{ display: "flex", alignItems: "center", gap: 14, padding: "16px 20px", borderBottom: "1px solid #181818", cursor: "pointer" }}>
          <div style={{ width: 42, height: 42, borderRadius: 11, background: "#2A1018", border: "1px solid #FF2D5530", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>🚫</div>
          <div>
            <div style={{ fontSize: 15, color: "#FF2D55", fontWeight: 500 }}>Mark Day Off</div>
            <div style={{ fontSize: 13, color: "#888888", marginTop: 2 }}>Approved — not available for dispatch</div>
          </div>
        </div>
        <div onClick={() => markTimeOff("requested")} style={{ display: "flex", alignItems: "center", gap: 14, padding: "16px 20px", borderBottom: "1px solid #181818", cursor: "pointer" }}>
          <div style={{ width: 42, height: 42, borderRadius: 11, background: "#2A1E08", border: "1px solid #FF8A0030", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>⏳</div>
          <div>
            <div style={{ fontSize: 15, color: "#FF8A00", fontWeight: 500 }}>Request Time Off</div>
            <div style={{ fontSize: 13, color: "#888888", marginTop: 2 }}>Pending approval — flagged for review</div>
          </div>
        </div>
        {selectedKey && (timeOff || {})[selectedKey] && (
          <div onClick={clearTimeOff} style={{ display: "flex", alignItems: "center", gap: 14, padding: "16px 20px", cursor: "pointer" }}>
            <div style={{ width: 42, height: 42, borderRadius: 11, background: "#0F1F14", border: "1px solid #00E5A030", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>✅</div>
            <div>
              <div style={{ fontSize: 15, color: "#00E5A0", fontWeight: 500 }}>Mark Available</div>
              <div style={{ fontSize: 13, color: "#888888", marginTop: 2 }}>Remove time off — available for dispatch</div>
            </div>
          </div>
        )}
      </BottomSheet>
    </div>
  );
}


// ── Calendar Screen ───────────────────────────────────────────────
function CalendarScreen({ jobs, techRoster, onJobTap }) {
  const today = new Date();
  const [viewDate, setViewDate] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
  const [selectedDate, setSelectedDate] = useState(null);

  const year  = viewDate.getFullYear();
  const month = viewDate.getMonth();

  const monthLabel = viewDate.toLocaleDateString("en-US", { month: "long", year: "numeric" });
  const firstDay   = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const prevMonth = () => { setViewDate(new Date(year, month - 1, 1)); setSelectedDate(null); };
  const nextMonth = () => { setViewDate(new Date(year, month + 1, 1)); setSelectedDate(null); };

  // Map jobs to date keys like "2026-04-07"
  const jobsByDate = {};
  jobs.forEach(job => {
    if (!job.dueDate) return;
    // Parse dueDate like "Apr 7" into a full date
    const parsed = new Date(`${job.dueDate} ${year}`);
    if (isNaN(parsed)) return;
    const key = parsed.toISOString().slice(0, 10);
    if (!jobsByDate[key]) jobsByDate[key] = [];
    jobsByDate[key].push(job);
  });

  const dateKey = (d) => {
    const mm = String(month + 1).padStart(2, "0");
    const dd = String(d).padStart(2, "0");
    return `${year}-${mm}-${dd}`;
  };

  const todayKey = today.toISOString().slice(0, 10);
  const selectedKey = selectedDate ? dateKey(selectedDate) : null;
  const selectedJobs = selectedKey ? (jobsByDate[selectedKey] || []) : [];

  // Flatten cells: empty slots + day numbers
  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const DAY_LABELS = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>

      {/* Month nav */}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "16px 20px 12px",
        borderBottom: "1px solid #222222",
      }}>
        <button onClick={prevMonth} style={{
          background: "#1E1E1E", border: "1px solid #333333",
          borderRadius: 10, width: 40, height: 40, color: "#AAAAAA",
          fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
        }}>‹</button>
        <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 20, fontWeight: 800, letterSpacing: "0.02em" }}>
          {monthLabel.toUpperCase()}
        </div>
        <button onClick={nextMonth} style={{
          background: "#1E1E1E", border: "1px solid #333333",
          borderRadius: 10, width: 40, height: 40, color: "#AAAAAA",
          fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
        }}>›</button>
      </div>

      {/* Day labels */}
      <div style={{
        display: "grid", gridTemplateColumns: "repeat(7, 1fr)",
        padding: "10px 10px 6px",
      }}>
        {DAY_LABELS.map(d => (
          <div key={d} style={{ textAlign: "center", fontSize: 12, color: "#555555", letterSpacing: "0.06em", fontWeight: 600 }}>{d}</div>
        ))}
      </div>

      {/* Calendar grid */}
      <div style={{ padding: "0 8px", overflowY: "auto", flex: selectedDate ? "0 0 auto" : 1 }}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 5 }}>
          {cells.map((day, i) => {
            if (!day) return <div key={`e-${i}`} />;
            const key = dateKey(day);
            const dayJobs = jobsByDate[key] || [];
            const isToday = key === todayKey;
            const isSelected = day === selectedDate;
            const techsOnDay = [...new Set(
              dayJobs.filter(j => j.assignedTo).map(j => j.assignedTo)
            )].slice(0, 3);

            return (
              <div key={day} onClick={() => setSelectedDate(isSelected ? null : day)}
                style={{
                  minHeight: 68, borderRadius: 12, padding: "8px 4px 6px",
                  background: isSelected ? "#2A2A2A"
                            : isToday    ? "#1E1E1E"
                            : "transparent",
                  border: isSelected ? "1px solid #555555"
                        : isToday    ? "1px solid #444444"
                        : "1px solid transparent",
                  cursor: "pointer", display: "flex", flexDirection: "column",
                  alignItems: "center", gap: 5, transition: "all 0.15s",
                }}>
                {/* Day number */}
                <div style={{
                  fontSize: 15, fontWeight: isToday ? 700 : 400,
                  color: isToday ? "#FFFFFF" : isSelected ? "#FFFFFF" : "#AAAAAA",
                  width: 28, height: 28, borderRadius: "50%",
                  background: isToday ? "#FFFFFF22" : "transparent",
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}>{day}</div>

                {/* Tech avatar badges */}
                {techsOnDay.length > 0 && (
                  <div style={{ display: "flex", gap: 2, flexWrap: "wrap", justifyContent: "center" }}>
                    {techsOnDay.map(techId => {
                      const tech = techRoster.find(t => t.id === techId);
                      if (!tech) return null;
                      return (
                        <div key={techId} style={{
                          width: 22, height: 22, borderRadius: "50%",
                          background: tech.color,
                          color: "#000",
                          display: "flex", alignItems: "center", justifyContent: "center",
                          fontSize: 9, fontWeight: 700, flexShrink: 0,
                          boxShadow: `0 0 4px ${tech.color}80`,
                        }}>{tech.avatar}</div>
                      );
                    })}
                    {dayJobs.filter(j => j.assignedTo).length > 3 && (
                      <div style={{
                        width: 22, height: 22, borderRadius: "50%",
                        background: "#333333", color: "#AAAAAA",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 9, fontWeight: 700,
                      }}>+{dayJobs.filter(j => j.assignedTo).length - 3}</div>
                    )}
                  </div>
                )}

                {/* Unassigned dot */}
                {dayJobs.some(j => !j.assignedTo) && (
                  <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#FF2D55", boxShadow: "0 0 4px #FF2D5580" }} />
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* Selected day detail */}
      {selectedDate && (
        <div style={{
          flex: 1, overflowY: "auto",
          borderTop: "1px solid #222222",
          padding: "14px 16px",
        }}>
          {/* Date header */}
          <div style={{ fontSize: 11, color: "#666666", letterSpacing: "0.12em", marginBottom: 12 }}>
            {new Date(year, month, selectedDate).toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" }).toUpperCase()}
            {" · "}
            {selectedJobs.length > 0 ? `${selectedJobs.length} JOB${selectedJobs.length !== 1 ? "S" : ""}` : "NO JOBS"}
          </div>

          {selectedJobs.length === 0 ? (
            <div style={{ textAlign: "center", color: "#444444", padding: "24px 0", fontSize: 13 }}>
              No jobs scheduled this day
            </div>
          ) : selectedJobs.map(job => {
            const tech = job.assignedTo ? techRoster.find(t => t.id === job.assignedTo) : null;
            return (
              <div key={job.id} onClick={() => onJobTap(job)} style={{
                background: "#1E1E1E", border: "1px solid #2A2A2A",
                borderRadius: 12, padding: "13px 14px", marginBottom: 8,
                cursor: "pointer",
                borderLeft: tech ? `3px solid ${tech.color}` : "3px solid #FF2D55",
              }}>
                <div style={{ marginBottom: 6 }}>
                  <span style={{ fontSize: 11, color: "#FFFFFF", letterSpacing: "0.06em" }}>{job.id}</span>
                </div>
                <div style={{ fontSize: 14, color: "#FFFFFF", fontWeight: 500, marginBottom: 4 }}>{job.title}</div>
                <div style={{ fontSize: 11, color: "#666666", marginBottom: 8 }}>📍 {job.address}</div>
                {tech ? (
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <div style={{
                      width: 20, height: 20, borderRadius: "50%",
                      background: tech.color, color: "#000",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 8, fontWeight: 700,
                    }}>{tech.avatar}</div>
                    <span style={{ fontSize: 12, color: tech.color }}>{tech.name}</span>
                    {job.startTime && <span style={{ fontSize: 11, color: "#555555" }}>· {job.startTime}</span>}
                  </div>
                ) : (
                  <span style={{
                    fontSize: 11, color: "#FF2D55",
                    background: "#FF2D5515", border: "1px solid #FF2D5530",
                    borderRadius: 20, padding: "2px 10px",
                  }}>Unassigned</span>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Settings Screen ───────────────────────────────────────────────
const TECH_COLORS = ["#00C2FF","#FF6B35","#A259FF","#00E5A0","#FFD600","#FF4081","#29B6F6","#FF8A00","#E040FB","#00BCD4","#FF5722","#8BC34A"];

function SettingsScreen({ techs, onAdd, onUpdate, onRemove, showToast }) {
  const [section, setSection] = useState("team");   // "team" | "integrations"
  const [mode, setMode]       = useState("home");    // "home" | "add" | "edit"
  const [selectedId, setSelectedId] = useState("");
  const [editForm, setEditForm]     = useState({});
  const [addForm, setAddForm]       = useState({ name: "", email: "", phone: "", address: "", color: TECH_COLORS[0] });
  const [removeConfirm, setRemoveConfirm] = useState(false);

  // Integration credentials stored in state (would persist to localStorage in production)
  const [creds, setCreds] = useState({
    asanaToken:     "",
    asanaProjectId: "1211432949111353",
    appsScriptUrl:  "",
    trackerUrl:     "https://script.google.com/macros/s/AKfycbxn-jzzsj3h-1BWgdXeBzUYkVASYlX5iTAYgoiku_Y7wf8NLKL_wxKvcWXHP0yQNmOFkQ/exec",
    slackWebhook:   "",
  });
  const [testStatus, setTestStatus] = useState({});
  const [showSecret, setShowSecret] = useState({});

  const selectedTech = techs.find(t => t.id === selectedId);

  const inputStyle = {
    background: "#1A1A1A", border: "1px solid #333333", borderRadius: 10,
    color: "#FFFFFF", fontSize: 14, padding: "11px 14px",
    outline: "none", width: "100%", fontFamily: "'DM Mono', monospace",
  };
  const labelStyle = { fontSize: 10, color: "#666666", letterSpacing: "0.1em", marginBottom: 6, display: "block" };

  const openEdit = (id) => {
    const tech = techs.find(t => t.id === id);
    if (!tech) return;
    setSelectedId(id);
    setEditForm({ name: tech.name, email: tech.email, phone: tech.phone || "", address: tech.address || "", color: tech.color });
    setRemoveConfirm(false);
    setMode("edit");
  };

  const saveEdit = () => {
    if (!editForm.name.trim() || !editForm.email.trim()) { showToast("❌ Name and email required"); return; }
    onUpdate(selectedId, { name: editForm.name.trim(), email: editForm.email.trim().toLowerCase(), phone: editForm.phone.trim(), address: editForm.address.trim(), color: editForm.color, avatar: editForm.name.trim().slice(0, 2).toUpperCase() });
    showToast(`✓ ${editForm.name} updated`);
    setMode("home"); setSelectedId("");
  };

  const handleRemove = () => {
    onRemove(selectedId);
    showToast(`🗑 ${selectedTech?.name} removed`);
    setMode("home"); setSelectedId(""); setRemoveConfirm(false);
  };

  const handleAdd = () => {
    if (!addForm.name.trim() || !addForm.email.trim()) { showToast("❌ Name and email required"); return; }
    const id = addForm.name.trim().toLowerCase().replace(/\s+/g, "_") + "_" + Date.now();
    onAdd({ id, name: addForm.name.trim(), email: addForm.email.trim().toLowerCase(), phone: addForm.phone.trim(), address: addForm.address.trim(), color: addForm.color, avatar: addForm.name.trim().slice(0, 2).toUpperCase() });
    showToast(`✓ ${addForm.name} added`);
    setAddForm({ name: "", email: "", phone: "", address: "", color: TECH_COLORS[0] });
    setMode("home");
  };

  const testConnection = async (key) => {
    setTestStatus(p => ({ ...p, [key]: "testing" }));
    try {
      let ok = false;
      if (key === "asana") {
        const res = await fetch(`https://app.asana.com/api/1.0/projects/${creds.asanaProjectId}`, { headers: { Authorization: `Bearer ${creds.asanaToken}` } });
        ok = res.ok;
      } else if (key === "appsScript") {
        const res = await fetch(creds.appsScriptUrl);
        ok = res.ok || res.status === 405; // Apps Script returns 405 on GET if POST-only
      } else if (key === "slack") {
        // Slack webhooks can't be tested with a GET, just validate format
        ok = creds.slackWebhook.startsWith("https://hooks.slack.com/");
      }
      setTestStatus(p => ({ ...p, [key]: ok ? "ok" : "error" }));
      showToast(ok ? `✅ ${key} connected!` : `❌ ${key} connection failed`);
    } catch {
      setTestStatus(p => ({ ...p, [key]: "error" }));
      showToast(`❌ ${key} unreachable — check the URL`);
    }
    setTimeout(() => setTestStatus(p => ({ ...p, [key]: null })), 5000);
  };


  const ColorPicker = ({ value, onChange }) => (
    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
      {TECH_COLORS.map(c => (
        <div key={c} onClick={() => onChange(c)} style={{ width: 28, height: 28, borderRadius: "50%", background: c, cursor: "pointer", border: value === c ? "3px solid #FFFFFF" : "3px solid transparent", boxSizing: "border-box" }} />
      ))}
    </div>
  );

  const [expandedCard, setExpandedCard] = useState(null);

  const HintBlock = ({ text }) => (
    <div style={{ marginTop: 10, background: "#0D0D0D", borderRadius: 8, padding: "12px 14px" }}>
      {text.split("\n").map((line, i) => (
        <div key={i} style={{
          fontSize: 12,
          color: line.startsWith("HOW TO") ? "#AAAAAA"
               : line.startsWith("⚠️")    ? "#FF8A00"
               : line.match(/^\d+\./)     ? "#CCCCCC"
               : "#555555",
          lineHeight: 1.75,
          fontWeight: line.startsWith("HOW TO") ? 700 : 400,
          letterSpacing: line.startsWith("HOW TO") ? "0.08em" : 0,
          marginTop: line === "" ? 4 : 0,
        }}>{line}</div>
      ))}
    </div>
  );

  const IntegrationCard = ({ id, icon, title, description, tokenKey, tokenLabel, tokenPlaceholder, tokenHint, urlKey, urlLabel, urlPlaceholder, urlHint, extraKey, extraLabel, extraPlaceholder, extraHint }) => {
    const isOpen   = expandedCard === id;
    const status   = testStatus[id];
    const hasValue = (tokenKey && creds[tokenKey]) || (urlKey && creds[urlKey]);

    const statusColor = status === "ok"      ? "#00E5A0"
                      : status === "error"   ? "#FF2D55"
                      : status === "testing" ? "#FF8A00"
                      : hasValue             ? "#555555"
                      : "#333333";

    const statusLabel = status === "ok"      ? "Connected"
                      : status === "error"   ? "Failed"
                      : status === "testing" ? "Testing..."
                      : hasValue             ? "Not tested"
                      : "Not set";

    return (
      <div style={{
        background: "#1A1A1A",
        border: `1px solid ${isOpen ? "#3A3A3A" : "#222222"}`,
        borderRadius: 14, overflow: "hidden", marginBottom: 10,
        transition: "border-color 0.2s",
      }}>
        {/* ── Collapsed header — always visible ── */}
        <div
          onClick={() => setExpandedCard(isOpen ? null : id)}
          style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 16px", cursor: "pointer" }}
        >
          <div style={{
            width: 38, height: 38, borderRadius: 10, flexShrink: 0,
            background: "#222222", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18,
          }}>{icon}</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 14, color: "#FFFFFF", fontWeight: 600 }}>{title}</div>
            <div style={{ fontSize: 11, color: "#555555", marginTop: 1, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{description}</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
            <div style={{ width: 6, height: 6, borderRadius: "50%", background: statusColor, boxShadow: status ? `0 0 5px ${statusColor}` : "none" }} />
            <span style={{ fontSize: 11, color: statusColor, whiteSpace: "nowrap" }}>{statusLabel}</span>
            <span style={{
              color: "#444444", fontSize: 12, marginLeft: 2,
              display: "inline-block",
              transform: isOpen ? "rotate(90deg)" : "rotate(0deg)",
              transition: "transform 0.2s",
            }}>▶</span>
          </div>
        </div>

        {/* ── Expanded body ── */}
        {isOpen && (
          <div style={{ borderTop: "1px solid #222222", padding: "16px", display: "flex", flexDirection: "column", gap: 14 }}>

            {tokenKey && (
              <div>
                <span style={labelStyle}>{tokenLabel}</span>
                <div style={{ position: "relative" }}>
                  <input
                    type={showSecret[tokenKey] ? "text" : "password"}
                    style={{ ...inputStyle, paddingRight: 44 }}
                    placeholder={tokenPlaceholder}
                    value={creds[tokenKey]}
                    onChange={e => setCreds(p => ({ ...p, [tokenKey]: e.target.value }))}
                  />
                  <button onClick={() => setShowSecret(p => ({ ...p, [tokenKey]: !p[tokenKey] }))}
                    style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "#555555", cursor: "pointer", fontSize: 14 }}>
                    {showSecret[tokenKey] ? "🙈" : "👁"}
                  </button>
                </div>
                {tokenHint && <HintBlock text={tokenHint} />}
              </div>
            )}

            {urlKey && (
              <div>
                <span style={labelStyle}>{urlLabel}</span>
                <input style={inputStyle} placeholder={urlPlaceholder} value={creds[urlKey]} onChange={e => setCreds(p => ({ ...p, [urlKey]: e.target.value }))} />
                {urlHint && <HintBlock text={urlHint} />}
              </div>
            )}

            {extraKey && (
              <div>
                <span style={labelStyle}>{extraLabel}</span>
                <input style={inputStyle} placeholder={extraPlaceholder} value={creds[extraKey]} onChange={e => setCreds(p => ({ ...p, [extraKey]: e.target.value }))} />
                {extraHint && <HintBlock text={extraHint} />}
              </div>
            )}

            {/* Test + Save row */}
            <div style={{ display: "flex", gap: 8, marginTop: 2 }}>
              <button onClick={() => testConnection(id)} style={{
                flex: 1, background: "#222222", border: "1px solid #333333", borderRadius: 10,
                padding: "12px", fontSize: 13, cursor: "pointer", fontFamily: "'DM Mono', monospace",
                color: status === "ok" ? "#00E5A0" : status === "error" ? "#FF2D55" : "#AAAAAA",
              }}>
                {status === "testing" ? "⏳ Testing..." : status === "ok" ? "✅ Connected" : status === "error" ? "❌ Failed" : "🔌 Test Connection"}
              </button>
              <button onClick={() => { showToast(`✅ ${title} settings saved`); setExpandedCard(null); }} style={{
                flex: 1, background: "#FFFFFF", border: "none", borderRadius: 10,
                padding: "12px", fontSize: 13, fontWeight: 700, color: "#111111", cursor: "pointer",
              }}>
                💾 Save
              </button>
            </div>
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>

      {/* Section tabs */}
      <div style={{ display: "flex", borderBottom: "1px solid #222222", background: "#111111" }}>
        {[["team", "👥 Team"], ["integrations", "🔌 Integrations"]].map(([id, label]) => (
          <button key={id} onClick={() => { setSection(id); setMode("home"); setSelectedId(""); }}
            style={{
              flex: 1, background: "none", border: "none",
              borderBottom: section === id ? "2px solid #FFFFFF" : "2px solid transparent",
              color: section === id ? "#FFFFFF" : "#555555",
              padding: "12px 0", fontSize: 12, fontWeight: 600,
              cursor: "pointer", fontFamily: "'DM Mono', monospace", letterSpacing: "0.05em",
              transition: "all 0.15s",
            }}>{label}</button>
        ))}
      </div>

function LoginScreen({ onAuth }) {
  const [pwInput, setPwInput] = useState("");
  const [pwError, setPwError] = useState(false);
  const [showPw, setShowPw] = useState(false);

  const handleLogin = () => {
    if (pwInput === "KnuckleHeadz") {
      sessionStorage.setItem("nova_auth", "1");
      onAuth();
    } else {
      setPwError(true);
      setPwInput("");
      setTimeout(() => setPwError(false), 1500);
    }
  };

  return (
    <div style={{
      height: "100vh", width: "100%", background: "#111111",
      display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center",
      fontFamily: "'DM Mono', monospace", padding: "0 32px",
    }}>
      <div style={{ marginBottom: 48, textAlign: "center" }}>
        <div style={{
          width: 64, height: 64, borderRadius: 18, background: "#1E1E1E",
          border: "1px solid #333333", display: "flex", alignItems: "center",
          justifyContent: "center", fontSize: 32, margin: "0 auto 16px",
        }}>⚡</div>
        <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 32, fontWeight: 800, color: "#FFFFFF", letterSpacing: "0.06em" }}>NOVA</div>
        <div style={{ fontSize: 12, color: "#444444", marginTop: 4, letterSpacing: "0.1em" }}>SMART TECH INSTALLS</div>
      </div>

      <div style={{ width: "100%", maxWidth: 320 }}>
        <div style={{ fontSize: 11, color: "#555555", letterSpacing: "0.12em", marginBottom: 8 }}>PASSWORD</div>
        <div style={{ position: "relative" }}>
          <input
            type={showPw ? "text" : "password"}
            value={pwInput}
            onChange={e => setPwInput(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleLogin()}
            placeholder="Enter password"
            autoFocus
            style={{
              width: "100%", background: "#1A1A1A",
              border: `1px solid ${pwError ? "#FF2D55" : "#2A2A2A"}`,
              borderRadius: 12, color: "#FFFFFF",
              fontSize: 16, padding: "14px 48px 14px 16px",
              outline: "none", fontFamily: "'DM Mono', monospace",
              transition: "border-color 0.2s",
            }}
          />
          <button onClick={() => setShowPw(v => !v)} style={{
            position: "absolute", right: 14, top: "50%", transform: "translateY(-50%)",
            background: "none", border: "none", color: "#555555", cursor: "pointer", fontSize: 16,
          }}>{showPw ? "🙈" : "👁"}</button>
        </div>

        {pwError && (
          <div style={{ fontSize: 12, color: "#FF2D55", marginTop: 8, textAlign: "center" }}>
            Incorrect password — try again
          </div>
        )}

        <button onClick={handleLogin} style={{
          width: "100%", marginTop: 14,
          background: "#FFFFFF", border: "none", borderRadius: 12,
          padding: "14px", fontSize: 15, fontWeight: 700,
          color: "#111111", cursor: "pointer", letterSpacing: "0.04em",
        }}>
          Enter Nova
        </button>
      </div>

      <div style={{ position: "absolute", bottom: 32, fontSize: 11, color: "#2A2A2A", letterSpacing: "0.08em" }}>
        DISPATCH PLATFORM · INTERNAL USE ONLY
      </div>
    </div>
  );
}

function DispatchApp() {
  const [authed, setAuthed] = useState(() => sessionStorage.getItem("nova_auth") === "1");
  if (!authed) return <LoginScreen onAuth={() => setAuthed(true)} />;
  return <NovaApp />;
}

function NovaApp() {
  const [jobs, setJobs]             = useState(MOCK_JOBS);
  const [activeTab, setActiveTab]   = useState("jobs");
  const [screen, setScreen]         = useState("list");
  const [selectedJob, setSelectedJob]   = useState(null);
  const [selectedTech, setSelectedTech] = useState(null);
  const [filter, setFilter]         = useState("unassigned");
  const [toast, setToast]           = useState(null);
  const [timeOff, setTimeOff]       = useState({});
  const [asanaStatus, setAsanaStatus] = useState("idle");
  const [techRoster, setTechRoster] = useState(TECHS);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2800);
  };

  const addTech = (tech) => {
    setTechRoster(prev => [...prev, tech]);
  };
  const updateTech = (id, updated) => {
    setTechRoster(prev => prev.map(t => t.id === id ? { ...t, ...updated } : t));
  };
  const removeTech = (id) => {
    setTechRoster(prev => prev.filter(t => t.id !== id));
    // unassign any jobs assigned to removed tech
    setJobs(prev => prev.map(j =>
      j.assignedTo === id ? { ...j, assignedTo: null, status: "unassigned" } : j
    ));
  }; // "idle" | "checking" | "ok" | "error"

  const ASANA_PROJECT_ID = "1211432949111353";
  const ASANA_API_TOKEN  = "YOUR_ASANA_TOKEN_HERE";

  const checkAsanaConnection = async () => {
    setAsanaStatus("checking");
    try {
      const res = await fetch(
        `https://app.asana.com/api/1.0/projects/${ASANA_PROJECT_ID}`,
        { headers: { Authorization: `Bearer ${ASANA_API_TOKEN}` } }
      );
      if (res.ok) {
        setAsanaStatus("ok");
        showToast("✅ Asana connected successfully!");
        setTimeout(() => setAsanaStatus("idle"), 4000);
      } else {
        setAsanaStatus("error");
        showToast("❌ Asana connection failed — check token");
        setTimeout(() => setAsanaStatus("idle"), 4000);
      }
    } catch (err) {
      setAsanaStatus("error");
      showToast("❌ Asana unreachable — check connection");
      setTimeout(() => setAsanaStatus("idle"), 4000);
    }
  };


  const updateTimeOff = (techId, dateKey, status) => {
    setTimeOff(prev => {
      const techMap = { ...(prev[techId] || {}) };
      if (status === null) { delete techMap[dateKey]; }
      else { techMap[dateKey] = status; }
      return { ...prev, [techId]: techMap };
    });
  };

  // Get all dateKeys a tech has time off (any status) this week
  const getTechTimeOffForWeek = (techId, weekDays) => {
    const techMap = timeOff[techId] || {};
    return weekDays
      .filter(d => techMap[d.key])
      .map(d => ({ ...d, status: techMap[d.key] }));
  };

  const updateJob = (jobId, updates) => {
    // Support both old (techId string) and new (updates object) call signatures
    const patch = typeof updates === "string"
      ? { assignedTo: updates, status: updates ? "assigned" : "unassigned" }
      : updates;
    setJobs(prev => prev.map(j => j.id === jobId ? { ...j, ...patch } : j));
  };

  // keep selectedJob in sync
  useEffect(() => {
    if (selectedJob) {
      const updated = jobs.find(j => j.id === selectedJob.id);
      if (updated) setSelectedJob(updated);
    }
  }, [jobs]);

  const openJob = (job) => { setSelectedJob(job); setScreen("detail"); };
  const openTech = (tech) => { setSelectedTech(tech); setScreen("techDetail"); };

  const filteredJobs = jobs.filter(j =>
    filter === "all" ? true :
    filter === "unassigned" ? j.status === "unassigned" :
    j.status === "assigned" || j.status === "scheduled"
  );

  const unassigned = jobs.filter(j => j.status === "unassigned").length;

  return (
    <div style={{
      width: "100%", height: "100vh",
      display: "flex", flexDirection: "column",
      background: "#111111", fontFamily: "'DM Mono','Courier New',monospace",
      color: "#FFFFFF", position: "relative", overflow: "hidden",
    }}>
      <style>{`
        button { font-family: 'DM Mono', monospace; }
        .chip { background: none; border: 1px solid #3A3A3A; color: #888888; padding: 6px 14px; border-radius: 20px; font-size: 11px; cursor: pointer; white-space: nowrap; transition: all 0.15s; font-family: 'DM Mono', monospace; }
        .chip.active { background: #2A2A2A; border-color: #555555; color: #FFFFFF; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; background: none; border: none; padding: 10px 0 12px; cursor: pointer; color: #666666; font-size: 10px; letter-spacing: 0.1em; transition: color 0.15s; font-family: 'DM Mono', monospace; }
        .nav-btn.active { color: #FFFFFF; }
        .nav-icon { font-size: 21px; }
        .toast { position: fixed; bottom: 86px; left: 50%; transform: translateX(-50%); background: #1A1A1A; border: 1px solid #333333; border-radius: 24px; padding: 10px 20px; font-size: 13px; color: #FFFFFF; z-index: 999; white-space: nowrap; pointer-events: none; animation: fadeUp 0.2s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(6px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        .sidebar-btn { display: flex; align-items: center; gap: 14px; padding: 13px 22px; background: none; border: none; border-left: 3px solid transparent; color: #555555; font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.06em; cursor: pointer; transition: all 0.15s; text-align: left; width: 100%; }
        .sidebar-btn:hover { color: #AAAAAA; background: #141414; }
        .sidebar-btn.active { color: #FFFFFF; border-left-color: #FFFFFF; background: #1A1A1A; }
        .sidebar-icon { font-size: 17px; width: 22px; text-align: center; }
      `}</style>

      {/* ── Overlay screens ── */}
      {screen === "detail" && selectedJob && (
        <div style={{ position: "absolute", inset: 0, zIndex: 100, background: "#111111" }}>
          <JobDetailScreen
            job={selectedJob}
            onBack={() => setScreen("list")}
            onUpdate={updateJob}
            showToast={showToast}
            timeOff={timeOff}
            getTechTimeOffForWeek={getTechTimeOffForWeek}
            jobDateKey={selectedJob?.dateKey}
            onDispatched={() => {
              setTimeout(() => {
                setScreen("list");
                setActiveTab("jobs");
                setFilter("unassigned");
              }, 1500);
            }}
          />
        </div>
      )}
      {screen === "techDetail" && selectedTech && (
        <div style={{ position: "absolute", inset: 0, zIndex: 100, background: "#111111" }}>
          <TechDetailScreen
            tech={selectedTech}
            jobs={jobs}
            onBack={() => setScreen("list")}
            onJobTap={(job) => { setSelectedJob(job); setScreen("detail"); }}
            showToast={showToast}
            timeOff={timeOff[selectedTech.id] || {}}
            onUpdateTimeOff={(dateKey, status) => updateTimeOff(selectedTech.id, dateKey, status)}
          />
        </div>
      )}

      {/* ── Header ── */}
      <div style={{
        padding: "15px 18px 12px",
        borderBottom: "1px solid #333333",
        display: "flex", alignItems: "center", justifyContent: "space-between",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{
            width: 32, height: 32, borderRadius: 9,
            background: "linear-gradient(135deg, #333333, #111111)",
            display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15,
          }}>⚡</div>
          <div>
            <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 15, fontWeight: 800, letterSpacing: "-0.01em" }}>NOVA</div>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          {/* Asana connection check button */}
          <button
            onClick={checkAsanaConnection}
            disabled={asanaStatus === "checking"}
            style={{
              display: "flex", alignItems: "center", gap: 6,
              background: asanaStatus === "ok"    ? "#0F1F14"
                        : asanaStatus === "error" ? "#1F0A0A"
                        : "#1E1E1E",
              border: `1px solid ${
                asanaStatus === "ok"    ? "#00E5A050"
              : asanaStatus === "error" ? "#FF2D5550"
              : "#333333"}`,
              borderRadius: 20, padding: "5px 12px",
              cursor: asanaStatus === "checking" ? "default" : "pointer",
              transition: "all 0.2s",
            }}
          >
            <div style={{
              width: 7, height: 7, borderRadius: "50%", flexShrink: 0,
              background: asanaStatus === "ok"       ? "#00E5A0"
                        : asanaStatus === "error"    ? "#FF2D55"
                        : asanaStatus === "checking" ? "#FF8A00"
                        : "#555555",
              boxShadow: asanaStatus === "ok"       ? "0 0 6px #00E5A0"
                       : asanaStatus === "error"    ? "0 0 6px #FF2D55"
                       : asanaStatus === "checking" ? "0 0 6px #FF8A00"
                       : "none",
            }} />
            <span style={{
              fontSize: 11, fontWeight: 500,
              color: asanaStatus === "ok"       ? "#00E5A0"
                   : asanaStatus === "error"    ? "#FF2D55"
                   : asanaStatus === "checking" ? "#FF8A00"
                   : "#888888",
            }}>
              {asanaStatus === "checking" ? "Checking..." : "Asana"}
            </span>
          </button>

          {unassigned > 0 && (
            <div style={{
              background: "#FF2D55", color: "#fff", borderRadius: "50%",
              width: 20, height: 20, fontSize: 12, fontWeight: 700,
              display: "flex", alignItems: "center", justifyContent: "center",
            }}>{unassigned}</div>
          )}
        </div>
      </div>

      {/* ── Body (sidebar + content) ── */}
      <div className="app-body" style={{ flex: 1, display: "flex", overflow: "hidden" }}>

        {/* ── Desktop Sidebar ── */}
        <div className="sidebar" style={{ display: "none" }}>
          <div style={{ padding: "8px 20px 16px", borderBottom: "1px solid #1E1E1E", marginBottom: 8 }}>
            <div style={{ fontSize: 10, color: "#444444", letterSpacing: "0.14em" }}>NAVIGATION</div>
          </div>
          {[
            { id: "jobs",     icon: "📋", label: "Jobs"     },
            { id: "techs",    icon: "👥", label: "Team"     },
            { id: "calendar", icon: "📅", label: "Calendar" },
            { id: "settings", icon: "⚙️", label: "Settings" },
          ].map(tab => (
            <button key={tab.id}
              className={`sidebar-btn ${activeTab === tab.id && screen === "list" ? "active" : ""}`}
              onClick={() => { setActiveTab(tab.id); setScreen("list"); }}>
              <span className="sidebar-icon">{tab.icon}</span>
              {tab.label}
            </button>
          ))}
        </div>

        {/* ── Main content ── */}
        <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", position: "relative" }}>

          {activeTab === "jobs" && (
            <>
              <div style={{ display: "flex", gap: 8, padding: "12px 16px", overflowX: "auto", borderBottom: "1px solid #1E1E1E", flexShrink: 0 }}>
                {[["all", "All Jobs"], ["unassigned", "Unassigned 🔴"], ["assigned", "Assigned"]].map(([val, label]) => (
                  <button key={val} className={`chip ${filter === val ? "active" : ""}`} onClick={() => setFilter(val)}>{label}</button>
                ))}
              </div>
              <div style={{ flex: 1, overflowY: "auto", padding: "12px 16px" }}>
                {filteredJobs.length === 0
                  ? <div style={{ textAlign: "center", color: "#666666", padding: 60, fontSize: 14 }}>No jobs</div>
                  : filteredJobs.map(job => <JobCard key={job.id} job={job} onTap={() => openJob(job)} />)
                }
              </div>
            </>
          )}

          {activeTab === "techs" && (
            <div style={{ flex: 1, overflowY: "auto", padding: "12px 16px" }}>
              {techRoster.map(tech => {
                const count = jobs.filter(j => j.assignedTo === tech.id).length;
                const sched = jobs.filter(j => j.assignedTo === tech.id && j.status === "scheduled").length;
                return (
                  <div key={tech.id} onClick={() => openTech(tech)} style={{ display: "flex", alignItems: "center", gap: 14, background: "#1A1A1A", border: "1px solid #222222", borderRadius: 16, padding: "16px", marginBottom: 10, cursor: "pointer" }}>
                    <Avatar tech={tech} size={46} />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 16, color: "#FFFFFF", fontWeight: 500 }}>{tech.name}</div>
                      <div style={{ fontSize: 12, color: "#555555", marginTop: 3 }}>{count === 0 ? "No jobs this week" : `${count} job${count !== 1 ? "s" : ""} · ${sched} scheduled`}</div>
                    </div>
                    {count > 0 && <div style={{ background: tech.color + "18", border: `1px solid ${tech.color}38`, borderRadius: 20, padding: "4px 12px", fontSize: 14, color: tech.color, fontWeight: 600 }}>{count}</div>}
                    <span style={{ color: "#333333", fontSize: 20, marginLeft: 4 }}>›</span>
                  </div>
                );
              })}
            </div>
          )}

          {activeTab === "calendar" && (
            <CalendarScreen jobs={jobs} techRoster={techRoster} onJobTap={openJob} />
          )}

          {activeTab === "settings" && (
            <SettingsScreen techs={techRoster} onAdd={addTech} onUpdate={updateTech} onRemove={removeTech} showToast={showToast} />
          )}

          {/* Bottom Nav — mobile only */}
          <div className="mobile-only" style={{ display: "flex", borderTop: "1px solid #333333", background: "#111111", paddingBottom: "max(env(safe-area-inset-bottom), 34px)", flexShrink: 0 }}>
            {[
              { id: "jobs",     icon: "📋", label: "JOBS"     },
              { id: "techs",    icon: "👥", label: "TEAM"     },
              { id: "calendar", icon: "📅", label: "CALENDAR" },
              { id: "settings", icon: "⚙️", label: "SETTINGS" },
            ].map(tab => (
              <button key={tab.id} className={`nav-btn ${activeTab === tab.id && screen === "list" ? "active" : ""}`} onClick={() => { setActiveTab(tab.id); setScreen("list"); }}>
                <span className="nav-icon">{tab.icon}</span>
                {tab.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(DispatchApp));
  </script>
</body>
</html>
